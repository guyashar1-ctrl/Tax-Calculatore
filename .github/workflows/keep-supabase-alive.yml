name: Keep Supabase Alive

# Free-tier Supabase projects auto-pause after ~7 days of no DB activity.
# This workflow pings the project every 3 days so it stays awake.
# Reads VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY from repo secrets — nothing sensitive in the file.

on:
  schedule:
    # Every 3 days at 07:17 UTC (09:17 / 10:17 Israel time depending on DST).
    # Avoid the top of the hour — GitHub schedules everyone there and runs get delayed.
    - cron: '17 7 */3 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Supabase REST endpoint
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_ANON_KEY}" ]; then
            echo "::error::Missing VITE_SUPABASE_URL or VITE_SUPABASE_ANON_KEY repo secret. Add them under Settings -> Secrets and variables -> Actions."
            exit 1
          fi

          echo "Pinging Supabase REST root..."
          status=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
            --max-time 30 \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "${SUPABASE_URL%/}/rest/v1/")

          echo "HTTP ${status}"

          # 2xx and 401 both prove the project woke up and PostgREST routed the request to Postgres.
          # 5xx, timeouts (000), or any redirect to a "project paused" page means it's down.
          case "${status}" in
            2*|401)
              echo "Supabase project is alive (HTTP ${status})"
              ;;
            *)
              echo "::error::Supabase ping failed (HTTP ${status})"
              echo "--- response body ---"
              cat /tmp/resp.txt || true
              exit 1
              ;;
          esac
